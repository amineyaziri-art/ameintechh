<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmineTech | Professional PC Assembly & AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --accent: #ffd700; --bg: #02040a; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; line-height: 1.6; }

        /* Smooth Scroll Reveal */
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s all ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(2,4,10,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--primary); letter-spacing: -1px; }

        .hero { padding: 100px 20px; text-align: center; background: radial-gradient(circle at center, #0f172a 0%, var(--bg) 80%); }
        h1 { font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900; line-height: 0.9; margin: 0; }
        .gradient-text { background: linear-gradient(90deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* THE CLEAR SERVICE IDENTIFICATION */
        .disclaimer-box { 
            max-width: 900px; margin: -40px auto 60px; background: rgba(255, 215, 0, 0.05); 
            border: 1px dashed var(--accent); padding: 30px; border-radius: 24px; text-align: center;
        }
        .disclaimer-box h2 { color: var(--accent); margin-top: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; }
        .lang-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 15px; }
        .lang-item b { display: block; color: var(--primary); font-size: 0.7rem; margin-bottom: 5px; text-transform: uppercase; }
